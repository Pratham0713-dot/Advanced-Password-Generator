<!DOCTYPE html>
<html>
<head>
    <title>Advanced Password Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, button {
            margin: 10px;
            padding: 8px;
            width: 80%;
        }

        #output {
            margin-top: 10px;
            font-weight: bold;
        }

        .weak { color: red; }
        .medium { color: orange; }
        .strong { color: green; }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Generator</h2>

    <label>Password Length:</label><br>
    <input type="number" id="length" value="8" min="4"><br>

    <label><input type="checkbox" id="uppercase" checked> Uppercase</label><br>
    <label><input type="checkbox" id="lowercase" checked> Lowercase</label><br>
    <label><input type="checkbox" id="numbers" checked> Numbers</label><br>
    <label><input type="checkbox" id="symbols"> Symbols</label><br>

    <button onclick="generatePassword()">Generate Password</button>
    <button onclick="generateMultiple()">Generate 5 Passwords</button>

    <p id="output"></p>
    <p id="strength"></p>
</div>

<script>
function generatePassword() {
    let length = document.getElementById("length").value;
    let upper = document.getElementById("uppercase").checked;
    let lower = document.getElementById("lowercase").checked;
    let numbers = document.getElementById("numbers").checked;
    let symbols = document.getElementById("symbols").checked;

    let chars = "";
    if (upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (lower) chars += "abcdefghijklmnopqrstuvwxyz";
    if (numbers) chars += "0123456789";
    if (symbols) chars += "!@#$%^&*()_+";

    if (chars === "") {
        alert("Select at least one option!");
        return;
    }

    let password = "";
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    document.getElementById("output").innerText = "Password: " + password;
    checkStrength(password);
}

function generateMultiple() {
    let results = "";
    for (let i = 0; i < 5; i++) {
        results += generateSingle() + "<br>";
    }
    document.getElementById("output").innerHTML = results;
    document.getElementById("strength").innerText = "";
}

function generateSingle() {
    let length = document.getElementById("length").value;
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
    let password = "";
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return password;
}

function checkStrength(password) {
    let strengthText = document.getElementById("strength");

    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    if (strength <= 2) {
        strengthText.innerText = "Weak Password";
        strengthText.className = "weak";
    } else if (strength === 3) {
        strengthText.innerText = "Medium Password";
        strengthText.className = "medium";
    } else {
        strengthText.innerText = "Strong Password";
        strengthText.className = "strong";
    }
}
</script>

</body>
</html>
